apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intellect-webui
  namespace: intellect
  labels:
    app: intellect
    component: webui
spec:
  ingressClassName: nginx
  rules:
    - host: intellect.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intellect-webui
                port:
                  number: 9119
