# Intellect Helm Chart — Default Values

imageRegistry: docker.io/ontoweb
imageTag: latest
imagePullPolicy: IfNotPresent

# ── Agent Configuration ───────────────────────────────────────────────
agent:
  enabled: true
  replicas: 1
  hostNetwork: true
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  env:
    INTELLECT_UID: "10000"
    INTELLECT_GID: "10000"
  args:
    - "gateway"
    - "run"

# ── WebUI Configuration ───────────────────────────────────────────────
webui:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  service:
    type: ClusterIP
    port: 9119
  ingress:
    enabled: true
    className: nginx
    host: intellect.example.com
    path: /
    tls:
      enabled: false
      secretName: intellect-tls
  env:
    INTELLECT_WEBUI_HOST: "0.0.0.0"
    INTELLECT_WEBUI_PORT: "9119"
    INTELLECT_WEBUI_STATIC_DIR: "webui"

# ── Shared Persistence ────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# ── Service Account ───────────────────────────────────────────────────
serviceAccount:
  create: true
  name: intellect
