{{- if .Values.webui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intellect.fullname" . }}-webui
  labels:
    {{- include "intellect.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  replicas: {{ .Values.webui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "intellect.name" . }}
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        {{- include "intellect.labels" . | nindent 8 }}
        app.kubernetes.io/component: webui
    spec:
      {{- with .Values.webui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: webui
          image: {{ include "intellect.webuiImage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.webui.service.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.webui.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.webui.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.webui.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.webui.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /home/intellectwebui/.intellect
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "intellect.persistenceName" . }}
        - name: workspace
          emptyDir: {}
{{- end }}
