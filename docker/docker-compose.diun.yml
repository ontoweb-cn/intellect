# =============================================================================
# docker-compose.diun.yml — "notify only" image-update watcher (Diun)
# =============================================================================
# Diun (Docker Image Update Notifier) is NOTIFY-ONLY by design: it never pulls
# or restarts anything. It checks the registry for newer digests of the agent
# and webui images and emits a notification; YOU confirm the upgrade manually:
#
#   cd docker && docker compose pull && docker compose up -d
#
# Usage (overlay on top of the base compose):
#   docker compose -f docker-compose.yml -f docker-compose.diun.yml up -d
#
# By default Diun logs detected updates to its own stdout:
#   docker logs intellect-diun
# To push notifications elsewhere, uncomment a notifier block below
# (Telegram/Slack/webhook/email — see https://crazymax.dev/diun/notif/).
# =============================================================================

services:
  # Opt the existing services into Diun's watch list (label-based discovery).
  agent:
    labels:
      - "diun.enable=true"

  webui:
    labels:
      - "diun.enable=true"

  diun:
    image: crazymax/diun:latest
    container_name: intellect-diun
    command: serve
    restart: unless-stopped
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      # Check every 6 hours (cron syntax).
      - DIUN_WATCH_SCHEDULE=0 */6 * * *
      - DIUN_WATCH_JITTER=30s
      # Only watch containers explicitly labelled diun.enable=true (above).
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=false
      # --- Optional notifiers (defaults to stdout/log when none configured) ---
      # - DIUN_NOTIF_TELEGRAM_TOKEN=123:abc
      # - DIUN_NOTIF_TELEGRAM_CHATIDS=8125
      # - DIUN_NOTIF_SLACK_WEBHOOKURL=https://hooks.slack.com/services/...
      # - DIUN_NOTIF_WEBHOOK_ENDPOINT=https://example.com/webhook
      # - DIUN_NOTIF_WEBHOOK_METHOD=POST
    volumes:
      # Read-only socket: Diun only needs to inspect, never to control Docker.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - diun-data:/data

volumes:
  diun-data:
